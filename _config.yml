# Book settings
title: Ice-Based Ecosystems Research
author: Your Name
copyright: "2025"  # Copyright year to be placed in the footer

repository:
  url                       : https://github.com/YOUR_USERNAME/icey_ecosystems
  branch                    : main  

sphinx:
  config:
    # Better search
    html_search_language: 'en'
    html_search_options: {'type': 'default'}
    # Remove right sidebar (table of contents) but keep left navigation
    html_sidebars:
      "**": ["sbt-sidebar-nav.html"]  # Only show left navigation, no right TOC
    # Additional settings to remove TOC
    html_show_sourcelink: false
    html_show_sphinx: false
    # Exclude environment directory from processing
    exclude_patterns:
      - '_build/**'
      - '*.code-workspace'
      - '.venv/**'

# Interactive features
interactive:
  enable: true

html:
  use_repository_button     : true
  use_issues_button         : true
  use_edit_page_button      : true
  navigation_depth: 4
  show_navbar_depth: 2
  extra_navbar              :  ""
  extra_footer: Distributed under the MIT license
  use_fullscreen_button: true
  theme:
    options:
      page_width: "90%"   # try values like "80%", "90%", or "1200px"
  # Disable right sidebar (table of contents)
  show_toc: false
  # Additional theme options to remove right TOC
  theme_options:
    show_toc: false
    toc_show: false
  # Custom CSS to hide right sidebar
  extra_css:
    - _static/custom.css
  theme:
    name: pydata_sphinx_theme
    options:
      secondary_sidebar_items: []   # removes the right-hand sidebar column entirely

execute:
  execute_notebooks   : "auto"
  allow_errors              : true
  timeout                   : 1000
  only_build_toc_files      : true
  cache: ".jupyter_cache"
  exclude_patterns:
    - 'template.ipynb'
    - '_build/*'
    - '.venv/**'

launch_buttons: 
  binderhub_url: "https://mybinder.org"

home_page_in_navbar: true
